<!DOCTYPE html>
<!--
  FicStash Intake - a tiny dark "loading dock" you open from any device (laptop,
  iPad, ...) to BULK add links + files to your FicStash library. Single
  self-contained file: host it in a public Supabase Storage bucket and open the
  URL. It writes to the SAME Supabase the phone app reads, so everything you add
  here shows up in the app.

  Design adapted from the "Hopper" Claude-Design mock, reskinned to FicStash's
  dark design tokens. First run asks for your Supabase URL + anon key (find them
  in Supabase -> Project Settings -> API); they're saved on the device and act as
  the gate - without them the tool does nothing.
-->
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FicStash Intake</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%237828c8' d='M12 3 3 8l9 5 9-5z'/%3E%3C/svg%3E" />
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root {
      --surface:#0c0c0e; --content1:#19191c; --content2:#252529; --content3:#34343a;
      --fg:#f3f3f4; --fg-2:#a1a1aa; --fg-3:#71717a;
      --accent:#9353d3; --accent-strong:#7828c8; --accent-soft:rgba(147,83,211,.18);
      --blue:#006fee; --success:#17c964; --warning:#f5a524; --danger:#f31260;
      --danger-light:#ff7eb0; --divider:rgba(255,255,255,.09);
      --grad:linear-gradient(135deg,#7828c8,#006fee);
      --font-sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      --font-mono:ui-monospace,SFMono-Regular,Menlo,monospace;
      --shadow-pop:0 8px 40px -8px rgba(0,0,0,.75), 0 2px 8px rgba(0,0,0,.5);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--surface);height:100%;font-family:var(--font-sans);color:var(--fg)}
    #root{min-height:100vh}
    input{font-family:var(--font-sans)}
    @keyframes slideIn{from{transform:translateY(8px);opacity:.4}to{transform:translateY(0);opacity:1}}
    @keyframes fade{from{opacity:.001}to{opacity:1}}
    @keyframes pop{0%{transform:scale(.94)}60%{transform:scale(1.03)}100%{transform:scale(1)}}
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes confettiFall{to{transform:translateY(120px) rotate(360deg);opacity:0}}
    @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-7deg)}75%{transform:rotate(7deg)}}
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-thumb{background:var(--content3);border-radius:9999px;border:2px solid var(--surface)}
    ::selection{background:rgba(147,83,211,.4)}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;
const uid = () => Math.random().toString(36).slice(2, 9);
const CFG_KEY = 'fs-intake-cfg';

// Baked-in connection so the tool auto-connects on any device (no setup screen).
// The anon key is the PUBLIC key and is safe to expose: since the DB lockdown
// (migration 0015) it grants NOTHING on its own — every table requires a
// logged-in owner session, so the tool shows a sign-in screen after connecting.
// Clearing site data falls back to the manual setup screen below.
const BAKED_CFG = {
  url: 'https://onzeiamzjicbswszhbpc.supabase.co',
  key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uemVpYW16amljYnN3c3poYnBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjQ3NDYsImV4cCI6MjA5NTYwMDc0Nn0.OqIb0D6FlIrXtiVdoTxpvcCI5w17xzDxi5kOB1yZFYU',
};

// ---- Supabase client (configured on first run) --------------------------
let sb = null;
function loadCfg() { try { return JSON.parse(localStorage.getItem(CFG_KEY) || 'null'); } catch { return null; } }
function initClient(cfg) {
  if (cfg && cfg.url && cfg.key && window.supabase) {
    sb = window.supabase.createClient(cfg.url, cfg.key);
    return true;
  }
  return false;
}

// Iconify WEB COMPONENT (shadow DOM) — React treats it as an opaque leaf, so it
// never tries to reconcile Iconify's injected SVG (the old .iconify scan script
// mutated React's nodes and crashed re-renders with a removeChild error).
function Icon({ icon, size = 18, color, style }) {
  return <iconify-icon icon={icon} width={size} height={size}
    style={{ color, lineHeight: 0, display: 'inline-flex', ...style }} />;
}

// ===== file helpers (ported from the app's EPUB/TXT upload parser) ========
const ACCEPT = ['epub', 'txt'];
const extOf = (n) => (n.split('.').pop() || '').toLowerCase();
const fmtSize = (b) => b < 1024 ? b + ' B' : b < 1048576 ? (b / 1024).toFixed(0) + ' KB' : (b / 1048576).toFixed(1) + ' MB';
const FILE_META = {
  epub: { icon: 'solar:book-2-bold', tint: '147,83,211', label: 'EPUB' },
  txt:  { icon: 'solar:document-text-bold', tint: '0,111,238', label: 'TXT' },
};
const countWords = (html) => (String(html).replace(/<[^>]+>/g, ' ').match(/\S+/g) || []).length;
const titleFromFilename = (name) => name.replace(/\.[^.]+$/, '').replace(/[._]+/g, ' ').trim() || 'Untitled';

function byTag(node, name) {
  return Array.from(node.getElementsByTagName('*')).filter(el => el.localName === name);
}
function resolvePath(dir, href) {
  const parts = (dir ? dir + '/' : '') + href;
  const out = [];
  for (const seg of parts.split('/')) {
    if (seg === '..') out.pop(); else if (seg !== '.' && seg !== '') out.push(seg);
  }
  return out.join('/');
}
function bodyHtml(doc) {
  const body = doc.body || doc.querySelector('body');
  return body ? body.innerHTML.trim() : '';
}
function headingText(doc) {
  const h = doc.querySelector('h1,h2,h3,title');
  return h ? h.textContent.replace(/\s+/g, ' ').trim() : '';
}

async function parseEpub(file) {
  const dom = new DOMParser();
  const zip = await JSZip.loadAsync(file);
  const containerFile = zip.file('META-INF/container.xml');
  if (!containerFile) throw new Error('Not a valid EPUB (no container.xml).');
  const container = dom.parseFromString(await containerFile.async('string'), 'application/xml');
  const rootfile = byTag(container, 'rootfile')[0];
  const opfPath = rootfile && rootfile.getAttribute('full-path');
  if (!opfPath) throw new Error('Not a valid EPUB (no rootfile).');
  const opfDir = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/')) : '';
  const opf = dom.parseFromString(await zip.file(opfPath).async('string'), 'application/xml');
  const title = (byTag(opf, 'title')[0]?.textContent || '').trim() || titleFromFilename(file.name);
  const author = (byTag(opf, 'creator')[0]?.textContent || '').trim();
  const descEl = byTag(opf, 'description')[0];
  const summary = descEl ? descEl.textContent.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim() : '';
  const metas = byTag(opf, 'meta');
  const metaName = (n) => { const el = metas.find(m => (m.getAttribute('name') || '').toLowerCase() === n); return el ? (el.getAttribute('content') || '').trim() : ''; };
  const metaProp = (p) => { const el = metas.find(m => (m.getAttribute('property') || '').toLowerCase() === p); return el ? (el.textContent || '').trim() : ''; };
  const series = metaName('calibre:series') || metaProp('belongs-to-collection');
  const idxRaw = metaName('calibre:series_index') || metaProp('group-position');
  const seriesIndex = idxRaw && !Number.isNaN(parseFloat(idxRaw)) ? parseFloat(idxRaw) : null;

  const manifest = {};
  byTag(opf, 'item').forEach(it => { const id = it.getAttribute('id'); if (id) manifest[id] = { href: it.getAttribute('href') || '', type: (it.getAttribute('media-type') || '').toLowerCase() }; });
  const spine = byTag(opf, 'itemref').map(ref => ref.getAttribute('idref')).filter(Boolean);
  const chapters = [];
  let n = 0;
  for (const idref of spine) {
    const item = manifest[idref];
    if (!item || !/x?html/.test(item.type)) continue;
    const entry = zip.file(resolvePath(opfDir, item.href));
    if (!entry) continue;
    const doc = dom.parseFromString(await entry.async('string'), 'text/html');
    const content = bodyHtml(doc);
    if (!content || countWords(content) < 3) continue;
    n += 1;
    chapters.push({ n, title: headingText(doc) || `Chapter ${n}`, content, words: countWords(content) });
  }
  if (!chapters.length) throw new Error('No readable chapters found in this EPUB.');
  return { title, author, summary, series, seriesIndex, chapters };
}

async function parseTxt(file) {
  const text = await file.text();
  const html = text.split(/\n{2,}/).map(p => `<p>${p.replace(/&/g,'&amp;').replace(/</g,'&lt;').trim()}</p>`).join('\n');
  const title = titleFromFilename(file.name);
  return { title, author: '', summary: '', series: '', seriesIndex: null,
    chapters: [{ n: 1, title, content: html, words: countWords(html) }] };
}

// Parse + insert one file as a fully-offline uploaded work (matches the app).
async function uploadFile(file) {
  // OneDrive / Google Drive "online-only" files hand over an empty placeholder
  // (no bytes on disk) — give a clear error instead of a vague parse failure.
  if (!file || file.size === 0) {
    throw new Error('Empty file — likely a cloud-only file. Make it available offline, then retry.');
  }
  const ext = extOf(file.name);
  const parsed = ext === 'epub' ? await parseEpub(file) : await parseTxt(file);
  const totalWords = parsed.chapters.reduce((s, c) => s + (c.words || 0), 0);
  const now = new Date().toISOString();
  const workRow = {
    source: 'upload', source_work_id: `upload-${(crypto.randomUUID && crypto.randomUUID()) || Date.now() + uid()}`,
    origin: 'upload', title: parsed.title, author: parsed.author || '', summary: parsed.summary || '',
    words: totalWords, chapters: parsed.chapters.length, chapters_total: parsed.chapters.length,
    status: 'complete', updated_label: 'Uploaded', source_updated: now,
    palette: Math.floor(Math.random() * 6), offline: true,
    series_name: parsed.series || null, series_index: parsed.seriesIndex ?? null,
  };
  const { data: work, error: workErr } = await sb.from('works').insert(workRow).select().single();
  if (workErr) throw new Error(workErr.message || String(workErr));
  const chapterRows = parsed.chapters.map(c => ({ work_id: work.id, n: c.n, title: c.title || `Chapter ${c.n}`, words: c.words || 0, content: c.content, fetched: true }));
  const { error: chErr } = await sb.from('chapters').insert(chapterRows);
  if (chErr) { try { await sb.from('works').delete().eq('id', work.id); } catch {} throw new Error(chErr.message || String(chErr)); }
  return parsed.title;
}

// Queue one link for the worker to fetch.
async function requestUrl(url) {
  const clean = (url || '').trim();
  if (!/^https?:\/\/\S+\.\S+/i.test(clean)) throw new Error('Not a full http(s) link');
  const { error } = await sb.from('requested_urls').insert({ url: clean });
  if (error) throw new Error(error.message || String(error));
  return clean;
}

// =========================================================================
function Confetti() {
  const cols = ['#9353d3', '#006fee', '#17c964', '#f5a524', '#f31260', '#ae7ede'];
  const bits = Array.from({ length: 24 }, (_, i) => ({ left: Math.random() * 100, delay: Math.random() * 0.25, dur: 0.9 + Math.random() * 0.7, col: cols[i % cols.length], size: 6 + Math.random() * 7, rot: Math.random() * 360 }));
  return (
    <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none', borderRadius: 'inherit' }}>
      {bits.map((b, i) => (
        <span key={i} style={{ position: 'absolute', top: -14, left: b.left + '%', width: b.size, height: b.size * 0.6, background: b.col, borderRadius: 2, transform: `rotate(${b.rot}deg)`, animation: `confettiFall ${b.dur}s ${b.delay}s ease-in forwards` }} />
      ))}
    </div>
  );
}

function Segment({ value, onChange }) {
  const tabs = [
    { id: 'links', label: 'Links', icon: 'solar:link-circle-bold' },
    { id: 'files', label: 'Files', icon: 'solar:cloud-upload-bold' },
  ];
  return (
    <div style={{ display: 'flex', background: 'var(--content2)', borderRadius: 14, padding: 5, gap: 4 }}>
      {tabs.map(t => {
        const on = value === t.id;
        return (
          <button key={t.id} onClick={() => onChange(t.id)} style={{
            flex: 1, height: 46, border: 'none', cursor: 'pointer', borderRadius: 10,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 9,
            fontFamily: 'var(--font-sans)', fontSize: 15, fontWeight: on ? 700 : 500,
            color: on ? '#fff' : 'var(--fg-2)', background: on ? 'var(--grad)' : 'transparent',
            boxShadow: on ? '0 8px 20px -8px rgba(120,40,200,.7)' : 'none', transition: 'all .2s cubic-bezier(.2,.8,.2,1)',
          }}>
            <Icon icon={t.icon} size={20} />{t.label}
          </button>
        );
      })}
    </div>
  );
}

function LinkRow({ item, onChange, onPasteBulk, onRemove, canRemove, autoFocus }) {
  const [focus, setFocus] = useState(false);
  const ref = useRef(null);
  useEffect(() => { if (autoFocus && ref.current) ref.current.focus(); }, [autoFocus]);
  const valid = item.value.trim() === '' || /^(https?:\/\/|www\.)\S+\.\S+/i.test(item.value.trim());
  const accent = !valid ? 'var(--danger)' : focus ? 'var(--accent)' : 'var(--content3)';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, animation: 'slideIn .25s ease' }}>
      <div style={{ flex: 1, height: 50, display: 'flex', alignItems: 'center', gap: 10, padding: '0 8px 0 14px', background: 'var(--content2)', border: `2px solid ${accent}`, borderRadius: 12, transition: 'border-color .15s' }}>
        <Icon icon={valid ? 'solar:link-bold' : 'solar:danger-triangle-bold'} size={18} color={!valid ? 'var(--danger)' : focus ? 'var(--accent)' : 'var(--fg-3)'} />
        <input ref={ref} value={item.value} onChange={e => onChange(item.id, e.target.value)} onPaste={e => onPasteBulk(e, item.id)}
          onFocus={() => setFocus(true)} onBlur={() => setFocus(false)} placeholder="https://paste-a-link-here.com"
          style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', minWidth: 0, fontSize: 15, color: 'var(--fg)' }} />
        {item.value.trim() && valid && <Icon icon="solar:check-circle-bold" size={18} color="var(--success)" />}
        <button onClick={() => onRemove(item.id)} disabled={!canRemove} title="Remove" style={{
          width: 34, height: 34, flex: 'none', border: 'none', borderRadius: 9, cursor: canRemove ? 'pointer' : 'not-allowed',
          background: 'rgba(255,255,255,.08)', color: '#fff', opacity: canRemove ? 1 : 0.4,
          display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all .15s',
        }}
          onMouseEnter={e => { if (canRemove) e.currentTarget.style.background = 'rgba(255,255,255,.18)'; }}
          onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,.08)'; }}>
          <Icon icon="solar:trash-bin-trash-bold" size={18} />
        </button>
      </div>
    </div>
  );
}

function LinksPanel({ onFetch, busy }) {
  const [rows, setRows] = useState([{ id: uid(), value: '' }]);
  const [lastAdded, setLastAdded] = useState(null);
  const setVal = (id, value) => setRows(r => r.map(x => x.id === id ? { ...x, value } : x));
  const addRow = () => { const id = uid(); setRows(r => [...r, { id, value: '' }]); setLastAdded(id); };
  const removeRow = (id) => setRows(r => r.length === 1 ? [{ id: uid(), value: '' }] : r.filter(x => x.id !== id));
  const onPasteBulk = (e, id) => {
    const text = e.clipboardData.getData('text');
    const parts = text.split(/[\s\n,]+/).map(s => s.trim()).filter(Boolean);
    if (parts.length <= 1) return;
    e.preventDefault();
    setRows(r => { const out = []; for (const x of r) { if (x.id === id) { out.push({ ...x, value: parts[0] }); for (let i = 1; i < parts.length; i++) out.push({ id: uid(), value: parts[i] }); } else out.push(x); } return out; });
  };
  const filled = rows.filter(r => r.value.trim());
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16 }}>
        <div>
          <div style={{ fontSize: 19, fontWeight: 700, letterSpacing: '-.01em' }}>Drop in some links</div>
          <div style={{ fontSize: 14, color: 'var(--fg-2)', marginTop: 3 }}>One per box - or paste a whole list and watch them split apart.</div>
        </div>
        <span style={chipStyle('var(--accent)')}><Icon icon="solar:link-circle-bold" size={14} />{filled.length} ready</span>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, maxHeight: 320, overflowY: 'auto', paddingRight: 4 }}>
        {rows.map(r => (
          <LinkRow key={r.id} item={r} onChange={setVal} onPasteBulk={onPasteBulk} onRemove={removeRow}
            canRemove={rows.length > 1 || r.value.trim() !== ''} autoFocus={r.id === lastAdded} />
        ))}
      </div>
      <button onClick={addRow} style={dashedBtn()}>
        <Icon icon="solar:add-circle-bold" size={20} /> Add another link
      </button>
      <FetchBar count={filled.length} noun="link" busy={busy} onFetch={() => onFetch('links', filled.map(r => r.value.trim()))} />
    </div>
  );
}

function FilesPanel({ onFetch, busy }) {
  const [files, setFiles] = useState([]);
  const [drag, setDrag] = useState(false);
  const inputRef = useRef(null);
  const add = (list) => {
    const incoming = Array.from(list).filter(f => ACCEPT.includes(extOf(f.name))).map(f => ({ id: uid(), file: f, name: f.name, size: f.size, ext: extOf(f.name) }));
    if (incoming.length) setFiles(f => [...f, ...incoming]);
  };
  const remove = (id) => setFiles(f => f.filter(x => x.id !== id));
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16 }}>
        <div>
          <div style={{ fontSize: 19, fontWeight: 700, letterSpacing: '-.01em' }}>Bring your own files</div>
          <div style={{ fontSize: 14, color: 'var(--fg-2)', marginTop: 3 }}>Drag a pile in, or pick them - EPUB &amp; TXT welcome.</div>
        </div>
        <span style={chipStyle('var(--blue)')}><Icon icon="solar:cloud-upload-bold" size={14} />{files.length} queued</span>
      </div>
      <div onClick={() => inputRef.current.click()}
        onDragOver={e => { e.preventDefault(); setDrag(true); }} onDragLeave={() => setDrag(false)}
        onDrop={e => { e.preventDefault(); setDrag(false); add(e.dataTransfer.files); }}
        style={{ minHeight: 168, borderRadius: 16, cursor: 'pointer', border: `2px dashed ${drag ? 'var(--accent)' : 'var(--content3)'}`,
          background: drag ? 'var(--accent-soft)' : 'var(--content2)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 10, textAlign: 'center', padding: 24, transition: 'all .2s' }}>
        <div style={{ width: 64, height: 64, borderRadius: 18, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--grad)', color: '#fff', boxShadow: '0 14px 30px -10px rgba(120,40,200,.8)', animation: drag ? 'wiggle .4s ease infinite' : 'floaty 3s ease-in-out infinite' }}>
          <Icon icon="solar:upload-square-bold" size={34} />
        </div>
        <div style={{ fontSize: 16, fontWeight: 700 }}>{drag ? 'Let go - drop them in!' : 'Drop files here'}</div>
        <div style={{ fontSize: 13, color: 'var(--fg-2)' }}>or <span style={{ color: 'var(--accent)', fontWeight: 600 }}>browse</span> - bulk select is fine</div>
        <div style={{ display: 'flex', gap: 6, marginTop: 2 }}>
          {ACCEPT.map(x => (
            <span key={x} style={{ fontSize: 11, fontWeight: 700, fontFamily: 'var(--font-mono)', letterSpacing: '.04em', padding: '3px 8px', borderRadius: 999, background: `rgba(${FILE_META[x].tint},.18)`, color: `rgb(${FILE_META[x].tint})`, textTransform: 'uppercase' }}>.{x}</span>
          ))}
        </div>
        <input ref={inputRef} type="file" multiple accept=".epub,.txt" style={{ display: 'none' }} onChange={e => { add(e.target.files); e.target.value = ''; }} />
      </div>
      {files.length > 0 && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, maxHeight: 220, overflowY: 'auto', paddingRight: 4 }}>
          {files.map(f => {
            const m = FILE_META[f.ext];
            return (
              <div key={f.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 12px', borderRadius: 12, background: 'var(--content2)', animation: 'pop .25s ease' }}>
                <div style={{ width: 40, height: 40, flex: 'none', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', background: `rgba(${m.tint},.18)`, color: `rgb(${m.tint})` }}><Icon icon={m.icon} size={22} /></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{f.name}</div>
                  <div style={{ fontSize: 12, color: 'var(--fg-2)', fontFamily: 'var(--font-mono)' }}>{m.label} - {fmtSize(f.size)}</div>
                </div>
                <button onClick={() => remove(f.id)} title="Remove" style={{ width: 34, height: 34, flex: 'none', border: 'none', borderRadius: 9, cursor: 'pointer', background: 'rgba(255,255,255,.08)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all .15s' }}
                  onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,.18)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,.08)'; }}>
                  <Icon icon="solar:trash-bin-trash-bold" size={17} />
                </button>
              </div>
            );
          })}
        </div>
      )}
      <FetchBar count={files.length} noun="file" busy={busy} onFetch={() => onFetch('files', files.map(f => f.file))} />
    </div>
  );
}

function FetchBar({ count, noun, onFetch, busy }) {
  const disabled = count === 0 || busy;
  return (
    <button onClick={() => { if (!disabled) onFetch(); }} disabled={disabled} style={{
      height: 58, border: 'none', borderRadius: 14, cursor: disabled ? 'not-allowed' : 'pointer', fontFamily: 'var(--font-sans)',
      fontSize: 17, fontWeight: 700, letterSpacing: '-.01em', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
      color: (count === 0 && !busy) ? 'var(--fg-2)' : '#fff', background: (count === 0 && !busy) ? 'var(--content2)' : 'var(--grad)',
      boxShadow: (count === 0 && !busy) ? 'none' : '0 16px 34px -12px rgba(120,40,200,.85)', transition: 'transform .12s, box-shadow .2s, opacity .2s', opacity: busy ? 0.92 : 1,
    }}>
      {busy ? (<><span style={{ width: 20, height: 20, borderRadius: '50%', border: '3px solid rgba(255,255,255,.35)', borderTopColor: '#fff', animation: 'spin .7s linear infinite' }} />Fetching...</>)
        : (<><Icon icon="solar:magic-stick-3-bold" size={22} />Fetch {count > 0 ? `${count} ${noun}${count > 1 ? 's' : ''}` : ''}</>)}
    </button>
  );
}

function Success({ kind, results, onReset }) {
  const okCount = results.filter(r => r.ok).length;
  return (
    <div style={{ position: 'relative', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 18, padding: '14px 0 4px', animation: 'fade .3s ease' }}>
      {okCount > 0 && <Confetti />}
      <div style={{ width: 88, height: 88, borderRadius: 26, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg,#17c964,#12a150)', color: '#fff', boxShadow: '0 18px 40px -12px rgba(23,201,100,.8)', animation: 'pop .45s ease' }}>
        <Icon icon="solar:check-circle-bold" size={50} />
      </div>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 23, fontWeight: 800, letterSpacing: '-.02em' }}>Off it goes!</div>
        <div style={{ fontSize: 15, color: 'var(--fg-2)', marginTop: 5 }}>
          {kind === 'links'
            ? <><b style={{ color: 'var(--fg)' }}>{okCount}</b> link{okCount === 1 ? '' : 's'} queued - they download on the next sync.</>
            : <>Added <b style={{ color: 'var(--fg)' }}>{okCount}</b> book{okCount === 1 ? '' : 's'} to your library.</>}
        </div>
      </div>
      <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 7, maxHeight: 200, overflowY: 'auto' }}>
        {results.map((r, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 12px', borderRadius: 11, background: 'var(--content2)', fontSize: 13 }}>
            <Icon icon={r.ok ? (kind === 'links' ? 'solar:link-bold' : 'solar:book-2-bold') : 'solar:danger-triangle-bold'} size={17} color={r.ok ? 'var(--accent)' : 'var(--danger-light)'} />
            <span style={{ flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', color: 'var(--fg-2)', fontFamily: kind === 'links' ? 'var(--font-mono)' : 'var(--font-sans)' }}>{r.name}</span>
            {r.ok ? <Icon icon="solar:check-read-bold" size={16} color="var(--success)" />
              : <span style={{ fontSize: 11, color: 'var(--danger-light)', whiteSpace: 'nowrap' }}>{r.msg}</span>}
          </div>
        ))}
      </div>
      <button onClick={onReset} style={{ height: 50, width: '100%', border: 'none', borderRadius: 13, cursor: 'pointer', fontFamily: 'var(--font-sans)', fontSize: 15, fontWeight: 700, color: 'var(--fg)', background: 'var(--content2)', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 9 }}>
        <Icon icon="solar:restart-bold" size={19} /> Add some more
      </button>
    </div>
  );
}

// ---- first-run setup (Supabase URL + anon key) --------------------------
function Setup({ onSaved }) {
  const [url, setUrl] = useState('');
  const [key, setKey] = useState('');
  const [err, setErr] = useState('');
  const save = () => {
    const u = url.trim().replace(/\/+$/, ''), k = key.trim();
    if (!/^https:\/\/.+\.supabase\.co$/i.test(u)) { setErr('Project URL looks like https://xxxx.supabase.co'); return; }
    if (k.length < 30) { setErr('That anon key looks too short.'); return; }
    const cfg = { url: u, key: k };
    if (!initClient(cfg)) { setErr('Could not start - check the values.'); return; }
    localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
    onSaved();
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div>
        <div style={{ fontSize: 19, fontWeight: 700 }}>Connect to your FicStash</div>
        <div style={{ fontSize: 13.5, color: 'var(--fg-2)', marginTop: 4, lineHeight: 1.5 }}>
          One-time setup. Find these in Supabase -> Project Settings -> API. Saved on this device only - it's how the tool reaches your library.
        </div>
      </div>
      {[['Project URL', url, setUrl, 'https://xxxx.supabase.co', false], ['Anon (public) key', key, setKey, 'eyJhbGc...', true]].map(([label, val, set, ph, mono]) => (
        <label key={label} style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--fg-2)' }}>{label}</span>
          <input value={val} onChange={e => { set(e.target.value); setErr(''); }} placeholder={ph} autoCapitalize="off" autoCorrect="off" spellCheck={false}
            style={{ height: 48, background: 'var(--content2)', border: '2px solid var(--content3)', borderRadius: 12, padding: '0 14px', color: 'var(--fg)', fontSize: 14, fontFamily: mono ? 'var(--font-mono)' : 'var(--font-sans)', outline: 'none' }} />
        </label>
      ))}
      {err && <div style={{ color: 'var(--danger-light)', fontSize: 13 }}>{err}</div>}
      <button onClick={save} style={{ height: 52, border: 'none', borderRadius: 13, cursor: 'pointer', background: 'var(--grad)', color: '#fff', fontSize: 16, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 9 }}>
        <Icon icon="solar:plug-circle-bold" size={20} /> Connect
      </button>
    </div>
  );
}

// ---- sign in (owner login) ----------------------------------------------
// The library is private: since the DB lockdown, the baked anon key reads/
// writes nothing on its own — every table needs a logged-in owner session.
// Sign in once with your FicStash email + password (the same as the app).
function Login({ onSignedIn }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const submit = async (e) => {
    e && e.preventDefault();
    if (busy) return;
    setErr('');
    const em = email.trim();
    if (!em || !password) { setErr('Enter your email and password.'); return; }
    setBusy(true);
    try {
      const { error } = await sb.auth.signInWithPassword({ email: em, password });
      if (error) throw error;
      onSignedIn();
    } catch (e2) { setErr((e2 && e2.message) || 'Could not sign in.'); setBusy(false); }
  };
  return (
    <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div>
        <div style={{ fontSize: 19, fontWeight: 700 }}>Sign in to your FicStash</div>
        <div style={{ fontSize: 13.5, color: 'var(--fg-2)', marginTop: 4, lineHeight: 1.5 }}>
          Your library is private and locked to your account. Use your FicStash email + password (same as the app). This is not an AO3 login.
        </div>
      </div>
      {[['Email', email, setEmail, 'you@example.com', 'email', 'username'], ['Password', password, setPassword, '••••••••', 'password', 'current-password']].map(([label, val, set, ph, type, ac]) => (
        <label key={label} style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--fg-2)' }}>{label}</span>
          <input type={type} value={val} onChange={e => { set(e.target.value); setErr(''); }} placeholder={ph} autoComplete={ac} autoCapitalize="off" autoCorrect="off" spellCheck={false}
            style={{ height: 48, background: 'var(--content2)', border: '2px solid var(--content3)', borderRadius: 12, padding: '0 14px', color: 'var(--fg)', fontSize: 14, fontFamily: 'var(--font-sans)', outline: 'none' }} />
        </label>
      ))}
      {err && <div style={{ color: 'var(--danger-light)', fontSize: 13 }}>{err}</div>}
      <button type="submit" disabled={busy} style={{ height: 52, border: 'none', borderRadius: 13, cursor: busy ? 'default' : 'pointer', opacity: busy ? .7 : 1, background: 'var(--grad)', color: '#fff', fontSize: 16, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 9 }}>
        <Icon icon="solar:login-3-bold" size={20} /> {busy ? 'Signing in…' : 'Sign in'}
      </button>
    </form>
  );
}

function chipStyle(color) { return { height: 26, borderRadius: 9999, padding: '0 11px', background: 'var(--content2)', color, fontSize: 12.5, fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: 6, whiteSpace: 'nowrap', flex: 'none' }; }
function dashedBtn() { return { height: 48, border: '2px dashed var(--content3)', borderRadius: 12, background: 'transparent', color: 'var(--fg-2)', cursor: 'pointer', fontFamily: 'var(--font-sans)', fontSize: 14, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }; }

function App() {
  const [ready, setReady] = useState(() => initClient(loadCfg() || (BAKED_CFG.url ? BAKED_CFG : null)));
  const [authed, setAuthed] = useState(undefined); // undefined=checking, false=login, true=in
  const [tab, setTab] = useState('links');
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(null); // { kind, results }

  // Track the owner session once the client is configured.
  React.useEffect(() => {
    if (!ready || !sb) return;
    let alive = true;
    sb.auth.getSession().then(({ data }) => { if (alive) setAuthed(!!data.session); });
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => { if (alive) setAuthed(!!s); });
    return () => { alive = false; sub.subscription.unsubscribe(); };
  }, [ready]);
  const signOut = () => { if (sb) sb.auth.signOut().catch(() => {}); };

  const runFetch = async (kind, items) => {
    setBusy(true);
    const results = [];
    for (const it of items) {
      try {
        if (kind === 'links') { const url = await requestUrl(it); results.push({ name: url, ok: true }); }
        else { const title = await uploadFile(it); results.push({ name: title, ok: true }); }
      } catch (e) {
        results.push({ name: kind === 'links' ? String(it) : it.name, ok: false, msg: (e && e.message) ? e.message.slice(0, 40) : 'failed' });
      }
    }
    // Links: nudge the worker so they start downloading now (best-effort).
    if (kind === 'links' && results.some(r => r.ok)) { try { await sb.functions.invoke('trigger-sync', { method: 'POST' }); } catch {} }
    setBusy(false);
    setDone({ kind, results });
  };

  return (
    <div style={{ minHeight: '100vh', position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
      <div style={{ position: 'fixed', top: -160, right: -120, width: 520, height: 520, borderRadius: '50%', background: 'rgba(147,83,211,.24)', filter: 'blur(90px)', pointerEvents: 'none' }} />
      <div style={{ position: 'fixed', bottom: -200, left: -140, width: 560, height: 560, borderRadius: '50%', background: 'rgba(0,111,238,.18)', filter: 'blur(100px)', pointerEvents: 'none' }} />

      <header style={{ position: 'relative', zIndex: 2, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '18px 26px', borderBottom: '1px solid var(--divider)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ width: 40, height: 40, borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--grad)', color: '#fff', boxShadow: '0 8px 20px -8px rgba(120,40,200,.8)' }}>
            <Icon icon="solar:inbox-in-bold" size={24} />
          </div>
          <div>
            <div style={{ fontSize: 18, fontWeight: 800, letterSpacing: '-.02em' }}>FicStash Intake</div>
            <div style={{ fontSize: 11, color: 'var(--fg-2)', marginTop: -1 }}>bulk add to your library</div>
          </div>
        </div>
        {ready && authed && (
          <button onClick={signOut} title="Sign out" style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '7px 13px', borderRadius: 999, background: 'var(--content2)', border: '1px solid var(--divider)', cursor: 'pointer', color: 'var(--fg-2)' }}>
            <span style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--success)', boxShadow: '0 0 0 3px rgba(23,201,100,.2)' }} />
            <span style={{ fontSize: 12.5, fontWeight: 600 }}>Signed in</span>
            <Icon icon="solar:logout-3-linear" size={15} />
          </button>
        )}
      </header>

      <main style={{ position: 'relative', zIndex: 1, flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '36px 20px' }}>
        <div style={{ width: '100%', maxWidth: 560 }}>
          <div style={{ background: 'var(--content1)', borderRadius: 20, border: '1px solid var(--divider)', boxShadow: 'var(--shadow-pop)', padding: 26, animation: 'pop .35s ease' }}>
            {!ready ? <Setup onSaved={() => setReady(true)} />
              : authed === undefined ? <div style={{ textAlign: 'center', color: 'var(--fg-2)', fontSize: 13, padding: '24px 0' }}>Loading…</div>
              : !authed ? <Login onSignedIn={() => setAuthed(true)} />
              : done ? <Success kind={done.kind} results={done.results} onReset={() => setDone(null)} />
              : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
                  <Segment value={tab} onChange={setTab} />
                  {tab === 'links' ? <LinksPanel onFetch={runFetch} busy={busy} /> : <FilesPanel onFetch={runFetch} busy={busy} />}
                </div>
              )}
          </div>
          {ready && authed && !done && (
            <div style={{ textAlign: 'center', marginTop: 16, fontSize: 12.5, color: 'var(--fg-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
              <Icon icon="solar:bolt-bold" size={14} color="var(--warning)" /> Everything you add lands in your FicStash app
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
